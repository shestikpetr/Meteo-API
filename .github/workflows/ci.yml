name: CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Сборка и тесты
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # MySQL поднимается как сервис для прогона contextLoads и будущих интеграционных тестов
    # Flyway накатит миграции, JPA ddl-auto=validate проверит соответствие схемы entity-классам
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: meteo
          MYSQL_USER: meteo
          MYSQL_PASSWORD: meteo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Настройка Gradle с кэшем
        uses: gradle/actions/setup-gradle@v4

      - name: Проверка форматирования (spotless)
        run: ./gradlew --no-daemon spotlessCheck

      # Тестовая конфигурация использует один MySQL и под локальную, и под sensor-БД: contextLoads не читает sensor-таблицы, ему достаточно валидного пула
      # JWT_SECRET подобран длиннее 32 байт для HS256
      - name: Тесты
        env:
          LOCAL_DB_HOST: 127.0.0.1
          LOCAL_DB_PORT: '3306'
          LOCAL_DB_NAME: meteo
          LOCAL_DB_USER: meteo
          LOCAL_DB_PASSWORD: meteo
          SENSOR_DB_HOST: 127.0.0.1
          SENSOR_DB_PORT: '3306'
          SENSOR_DB_NAME: meteo
          SENSOR_DB_USER: meteo
          SENSOR_DB_PASSWORD: meteo
          SENSOR_DB_USE_SSL: 'false'
          JWT_SECRET: ci-test-secret-must-be-long-enough-for-hs256-algorithm
        run: ./gradlew --no-daemon test

      - name: Сборка jar
        run: ./gradlew --no-daemon bootJar

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/app.jar
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Публикация Docker-образа
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Логин в ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Настройка Buildx
        uses: docker/setup-buildx-action@v3

      - name: Теги и метки образа
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Сборка и публикация образа
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Деплой на прод
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # CD: тянем свежий образ с ghcr и перезапускаем app-контейнер на сервере
    steps:
      - name: Перезапуск приложения по SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull app
            docker compose up -d app
            docker image prune -f

      - name: Health-check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          # Ждём до 60 секунд, пока /health вернёт 200
          script: |
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8080/health > /dev/null; then
                echo "Приложение поднялось"
                exit 0
              fi
              sleep 2
            done
            echo "Приложение не отвечает на /health" >&2
            exit 1
