spring:
  application:
    name: MeteoAPI

  config:
    import: optional:file:./.env[.properties]

  # локальная БД пользователей, станций, параметров
  datasource:
    url: jdbc:mysql://${LOCAL_DB_HOST:localhost}:${LOCAL_DB_PORT:3306}/${LOCAL_DB_NAME:meteo_local}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: ${LOCAL_DB_USER:root}
    password: ${LOCAL_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 3
      maximum-pool-size: 15
      idle-timeout: 600000
      connection-timeout: 30000
      pool-name: LocalDbHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  sql:
    init:
      mode: never

  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# удалённая БД с показаниями датчиков
app:
  sensor-datasource:
    url: jdbc:mysql://${SENSOR_DB_HOST:}:${SENSOR_DB_PORT:3306}/${SENSOR_DB_NAME:}?useSSL=${SENSOR_DB_USE_SSL:true}&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${SENSOR_DB_USER:}
    password: ${SENSOR_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: ${SENSOR_DB_POOL_MIN_IDLE:2}
      maximum-pool-size: ${SENSOR_DB_POOL_MAX:10}
      pool-name: SensorDbHikariPool
      connection-timeout-ms: ${SENSOR_DB_CONN_TIMEOUT_MS:30000}

  # Параметры выборки показаний из sensor-БД.
  sensor-query:
    # Значения <= порога считаются служебной заглушкой («нет данных») и отфильтровываются.
    invalid-value-threshold: ${SENSOR_INVALID_VALUE_THRESHOLD:-100}

  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-long-enough-for-hs256}
    access-token-expiration: ${JWT_ACCESS_TTL:86400}
    refresh-token-expiration: ${JWT_REFRESH_TTL:2592000}

springdoc:
  swagger-ui:
    # Порядок тегов берётся из OpenApiConfig.orderedTags() — tags-sorter сознательно не задан.
    operations-sorter: alpha
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.shestikpetr.meteoapi: DEBUG
    org.hibernate.SQL: WARN
