<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: head('Вход')}"></head>
<body class="bg-light">
<div class="container" style="max-width: 420px; padding-top: 10vh;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h4 mb-4 text-center">MeteoAPI Admin</h1>

            <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                Неверный логин или пароль.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                Вы вышли из админки.
            </div>

            <form th:action="@{/admin/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Логин</label>
                    <input type="text" class="form-control" id="username" name="username"
                           autocomplete="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" name="password"
                           autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
